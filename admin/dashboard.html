<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Fone2Cash</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../styles.css">
  <style>
    .dashboard-container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 24px;
    }
    .header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      padding: 24px;
      background: white;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .stat-card h3 {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
    }
    .quote-table {
      width: 100%;
      background: white;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      border-collapse: collapse;
    }
    .quote-table th, .quote-table td {
      padding: 16px 24px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .quote-table th {
      background: #F8FAFC;
      font-weight: 600;
      color: var(--secondary);
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: capitalize;
    }
    .status-pending { background: #FEF3C7; color: #92400E; }
    .status-quoted { background: #DBEAFE; color: #1E40AF; }
    .status-paid { background: #DCFCE7; color: #166534; }
    .status-rejected { background: #FEE2E2; color: #991B1B; }

    .media-preview img {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      object-fit: cover;
      cursor: pointer;
    }

    /* Modal Styles */
    #detailModal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      padding: 40px;
      border-radius: 12px;
      max-width: 800px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
  </style>
</head>
<body style="background-color: #F8FAFC;">
  <div class="dashboard-container">
    <div class="header-flex">
      <div>
        <a href="../index.html" class="branding-logo">Fone<span>2</span>Cash</a>
        <h2 style="margin-top: 8px;">Quote Management</h2>
      </div>
      <button id="logoutBtn" class="btn btn-secondary">Sign Out</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><h3>Total Quotes</h3><div class="value" id="totalQuotes">0</div></div>
      <div class="stat-card"><h3>Pending</h3><div class="value" id="pendingQuotes">0</div></div>
      <div class="stat-card"><h3>Quoted</h3><div class="value" id="quotedQuotes">0</div></div>
      <div class="stat-card"><h3>Paid</h3><div class="value" id="paidQuotes">0</div></div>
    </div>

    <div class="tabs" style="margin-bottom: 32px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 1px;">
      <button class="tab-btn active" data-tab="quotes" style="padding: 12px 24px; border: none; background: none; cursor: pointer; font-weight: 600; border-bottom: 2px solid var(--accent); color: var(--accent);">Quotes</button>
      <button class="tab-btn" data-tab="sales" style="padding: 12px 24px; border: none; background: none; cursor: pointer; font-weight: 600; color: var(--secondary);">Final Sales</button>
      <button class="tab-btn" data-tab="messages" style="padding: 12px 24px; border: none; background: none; cursor: pointer; font-weight: 600; color: var(--secondary);">Enquiries</button>
    </div>

    <div id="quotesTab" class="tab-content">
      <table class="quote-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Device</th>
            <th>Email</th>
            <th>Media</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="quoteList"></tbody>
      </table>
    </div>

    <div id="salesTab" class="tab-content" style="display: none;">
      <table class="quote-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Email</th>
            <th>Bank Info</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="salesList"></tbody>
      </table>
    </div>

    <div id="messagesTab" class="tab-content" style="display: none;">
      <table class="quote-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="messagesList"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { db, auth } from '../firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Auth Check
    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = 'index.html';
    });

    // Tab Logic
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.remove('active');
          b.style.borderBottom = 'none';
          b.style.color = 'var(--secondary)';
        });
        btn.classList.add('active');
        btn.style.borderBottom = '2px solid var(--accent)';
        btn.style.color = 'var(--accent)';

        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(btn.dataset.tab + 'Tab').style.display = 'block';
      };
    });

    // Logout
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    // --- Quotes ---
    const qQuotes = query(collection(db, "quotes"), orderBy("timestamp", "desc"));
    onSnapshot(qQuotes, (snapshot) => {
      const quoteList = document.getElementById('quoteList');
      quoteList.innerHTML = '';
      let total = 0, pending = 0, quoted = 0, paid = 0;

      snapshot.forEach((docSnap) => {
        const quote = docSnap.data();
        const id = docSnap.id;
        const date = quote.timestamp?.toDate().toLocaleDateString() || '...';
        
        total++;
        if (quote.status === 'pending') pending++;
        if (quote.status === 'quoted') quoted++;
        if (quote.status === 'paid') paid++;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${date}</td>
          <td><strong>${quote.brand} ${quote.model}</strong><br><small>${quote.storage}</small></td>
          <td>${quote.email}</td>
          <td class="media-preview">${quote.photos ? quote.photos.length : 0} <i class="fa-solid fa-image"></i> ${quote.video ? 1 : 0} <i class="fa-solid fa-video"></i></td>
          <td><span class="status-badge status-${quote.status}">${quote.status}</span></td>
          <td>
            <button class="btn btn-secondary view-btn" data-id="${id}" style="padding: 6px 12px; font-size: 0.8rem;">View</button>
            <select class="status-select" data-id="${id}" style="padding: 4px; border-radius: 4px; margin-left: 8px;">
              <option value="pending" ${quote.status === 'pending' ? 'selected' : ''}>Pending</option>
              <option value="quoted" ${quote.status === 'quoted' ? 'selected' : ''}>Quoted</option>
              <option value="paid" ${quote.status === 'paid' ? 'selected' : ''}>Paid</option>
              <option value="rejected" ${quote.status === 'rejected' ? 'selected' : ''}>Rejected</option>
            </select>
          </td>
        `;
        quoteList.appendChild(tr);
      });

      document.getElementById('totalQuotes').textContent = total;
      document.getElementById('pendingQuotes').textContent = pending;
      document.getElementById('quotedQuotes').textContent = quoted;
      document.getElementById('paidQuotes').textContent = paid;

      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.onclick = (e) => showDetails(e.target.dataset.id, snapshot);
      });

      document.querySelectorAll('.status-select').forEach(select => {
        select.onchange = (e) => updateDoc(doc(db, "quotes", e.target.dataset.id), { status: e.target.value });
      });
    });

    // --- Sales ---
    const qSales = query(collection(db, "sales"), orderBy("timestamp", "desc"));
    onSnapshot(qSales, (snapshot) => {
      const salesList = document.getElementById('salesList');
      salesList.innerHTML = '';
      snapshot.forEach((docSnap) => {
        const sale = docSnap.data();
        const date = sale.timestamp?.toDate().toLocaleDateString() || '...';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${date}</td>
          <td>${sale.name}<br><small>${sale.mobile}</small></td>
          <td>${sale.email}</td>
          <td>${sale.bank_name}<br><small>${sale.bsb} / ${sale.account_number}</small></td>
          <td><span class="status-badge status-${sale.status}">${sale.status}</span></td>
          <td>
             <select class="sale-status-select" data-id="${docSnap.id}" style="padding: 4px; border-radius: 4px;">
              <option value="pending" ${sale.status === 'pending' ? 'selected' : ''}>Pending</option>
              <option value="processed" ${sale.status === 'processed' ? 'selected' : ''}>Processed</option>
              <option value="paid" ${sale.status === 'paid' ? 'selected' : ''}>Paid</option>
            </select>
          </td>
        `;
        salesList.appendChild(tr);
      });
      document.querySelectorAll('.sale-status-select').forEach(select => {
        select.onchange = (e) => updateDoc(doc(db, "sales", e.target.dataset.id), { status: e.target.value });
      });
    });

    // --- Messages ---
    const qMessages = query(collection(db, "messages"), orderBy("timestamp", "desc"));
    onSnapshot(qMessages, (snapshot) => {
      const messagesList = document.getElementById('messagesList');
      messagesList.innerHTML = '';
      snapshot.forEach((docSnap) => {
        const msg = docSnap.data();
        const date = msg.timestamp?.toDate().toLocaleDateString() || '...';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${date}</td>
          <td>${msg.name}</td>
          <td>${msg.email}</td>
          <td style="max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${msg.message}</td>
          <td>
            <button class="btn btn-secondary msg-view-btn" data-id="${docSnap.id}" style="padding: 6px 12px; font-size: 0.8rem;">Read</button>
            <button class="btn btn-secondary msg-del-btn" data-id="${docSnap.id}" style="padding: 6px 12px; font-size: 0.8rem; background: #fee2e2; color: #991b1b; border: none;">Delete</button>
          </td>
        `;
        messagesList.appendChild(tr);
      });
      document.querySelectorAll('.msg-view-btn').forEach(btn => {
        btn.onclick = (e) => {
          const msg = snapshot.docs.find(d => d.id === e.target.dataset.id).data();
          alert(`From: ${msg.name}\nEmail: ${msg.email}\n\nMessage:\n${msg.message}`);
        };
      });
      document.querySelectorAll('.msg-del-btn').forEach(btn => {
        btn.onclick = async (e) => { if(confirm('Delete message?')) await deleteDoc(doc(db, "messages", e.target.dataset.id)); };
      });
    });

    function showDetails(id, snapshot) {
      const docSnap = snapshot.docs.find(d => d.id === id);
      const quote = docSnap.data();
      const modal = document.getElementById('detailModal');
      const body = document.getElementById('modalBody');

      body.innerHTML = `
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px;">
          <div>
            <h3>Device Info</h3>
            <p><strong>Brand:</strong> ${quote.brand}</p>
            <p><strong>Model:</strong> ${quote.model}</p>
            <p><strong>Storage:</strong> ${quote.storage}</p>
            <p><strong>Turns On:</strong> ${quote.turnOn}</p>
            <p><strong>Functional:</strong> ${quote.functional}</p>
            <p><strong>iCloud Wiped:</strong> ${quote.icloudWiped}</p>
            <p><strong>Description:</strong> ${quote.description || 'N/A'}</p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #EEE;">
            <h3>Contact</h3>
            <p><strong>Email:</strong> ${quote.email}</p>
          </div>
          <div>
            <h3>Media</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
              ${quote.photos ? quote.photos.map(p => `<a href="${p}" target="_blank"><img src="${p}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px;"></a>`).join('') : 'No photos'}
            </div>
            ${quote.video ? `<video src="${quote.video}" controls style="width: 100%; border-radius: 8px;"></video>` : 'No video'}
          </div>
        </div>
      `;
      modal.style.display = 'flex';
    }

    document.getElementById('closeModal').onclick = () => document.getElementById('detailModal').style.display = 'none';
    window.onclick = (e) => { if (e.target.id === 'detailModal') e.target.style.display = 'none'; };
  </script>
</body>
</html>
